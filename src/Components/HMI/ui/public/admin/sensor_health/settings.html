<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Settings – Project Echo</title>

  <link rel="stylesheet" type="text/css" href="/admin/css/styles.min.css" />
  <link rel="stylesheet" href="/admin/css/icons/tabler-icons/tabler-icons.css" />
  <link rel="stylesheet" href="/admin/sensor_health/style.css" />

  <script type="text/javascript" src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script type="text/javascript" src="/admin/js/app.min.js"></script>

  <!-- Shared admin page state -->
  <script type="text/javascript" src="/admin/js/admin-page-state.js"></script>

  <script src="/admin/sensor_health/script.js" defer></script>
</head>
<body>
  <div
    class="page-wrapper"
    id="main-wrapper"
    data-layout="vertical"
    data-navbarbg="skin6"
    data-sidebartype="full"
    data-sidebar-position="fixed"
    data-header-position="fixed"
  >
    <div id="sidebar"></div>

    <div class="body-wrapper">
      <div id="header"></div>

      <div class="container-fluid">
        <div class="sensor-page">
          <div class="dashboard-shell">
            <div class="admin-page-status">
              <div class="admin-error-banner d-none" role="alert" aria-live="polite">
                <div class="admin-error-banner__content">
                  <i class="ti ti-alert-circle"></i>
                  <span>Something went wrong while loading this page.</span>
                </div>
                <button type="button" class="admin-error-banner__dismiss" aria-label="Dismiss error message">
                  <i class="ti ti-x"></i>
                </button>
              </div>

              <div class="admin-loading-spinner d-none" role="status" aria-live="polite">
                <div class="spinner-border text-danger" aria-hidden="true"></div>
                <span class="admin-loading-spinner__text">Loading...</span>
              </div>
            </div>

            <section class="hero-header">
              <h1>Settings</h1>
              <p class="subtitle">configure recording behaviour and alert thresholds</p>
            </section>

            <p id="settings-message" class="note"></p>

            <section class="card">
              <h3>Recording &amp; alert settings</h3>
              <p class="card-subtitle">
                Adjust global defaults for sensor recording interval, sensitivity and low-battery alerts.
              </p>

              <div class="form-grid">
                <div>
                  <label for="record-interval">Recording interval</label>
                  <select id="record-interval">
                    <option>30 seconds</option>
                    <option selected>1 minute</option>
                    <option>5 minutes</option>
                    <option>10 minutes</option>
                  </select>
                </div>

                <div>
                  <label for="sensitivity">Sensitivity</label>
                  <select id="sensitivity">
                    <option>Low</option>
                    <option selected>Medium</option>
                    <option>High</option>
                  </select>
                </div>

                <div>
                  <label for="battery-threshold">Battery warning threshold (%)</label>
                  <input id="battery-threshold" type="number" value="25" min="1" max="100" />
                </div>
              </div>

              <button class="btn-primary" onclick="fakeSaveSettings()">Save settings</button>
            </section>
          </div>
        </div>

        <div id="footer"></div>
      </div>
    </div>
  </div>

  <script>
    $(document).ready(function() {
      $("#sidebar").load("/admin/component/sidebar-component.html", function() {
        $.getScript('/admin/js/sidebarmenu.js');
      });
      $("#header").load("/admin/component/header-component.html");
      $("#footer").load("/admin/component/footer-component.html");
    });

    const pageState = createAdminPageState();
    pageState.resetPageState();
  </script>
</body>
</html>
