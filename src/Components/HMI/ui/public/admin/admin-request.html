<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Echo Admin</title>

  <link rel="shortcut icon" type="image/png" href="/admin/images/logos/favicon.png" />
  <link type="text/css" rel="stylesheet" href="/admin/css/styles.min.css" />

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
    rel="stylesheet"
    crossorigin="anonymous"
  />

  <script type="text/javascript" src="https://kit.fontawesome.com/8aa980d912.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />

  <!-- Requests Page Styling -->
  <link type="text/css" rel="stylesheet" href="./css/requests.css">

  <!-- jQuery -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.10.6/moment.min.js"></script>
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.css" />
  <script type="text/javascript" src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.min.js"></script>

  <script type="text/javascript" src="/admin/js/sidebarmenu.js"></script>
  <script type="text/javascript" src="/admin/js/app.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/simplebar@latest/dist/simplebar.css" />
  <script src="https://cdn.jsdelivr.net/npm/simplebar@latest/dist/simplebar.min.js"></script>

  <!-- Shared admin page state -->
  <script type="text/javascript" src="/admin/js/admin-page-state.js"></script>
</head>

<body>
  <!-- Body Wrapper -->
  <div
    class="page-wrapper"
    id="main-wrapper"
    data-layout="vertical"
    data-navbarbg="skin6"
    data-sidebartype="full"
    data-sidebar-position="fixed"
    data-header-position="fixed"
  >
    <!-- Sidebar Start -->
    <div id="sidebar"></div>
    <!-- Sidebar End -->

    <!-- Main wrapper -->
    <div class="body-wrapper">
      <div id="header"></div>

      <div class="container-fluid">
        <div class="admin-page-status">
          <div class="admin-error-banner d-none" role="alert" aria-live="polite">
            <div class="admin-error-banner__content">
              <i class="ti ti-alert-circle"></i>
              <span>Something went wrong while loading this page.</span>
            </div>
            <button type="button" class="admin-error-banner__dismiss" aria-label="Dismiss error message">
              <i class="ti ti-x"></i>
            </button>
          </div>

          <div class="admin-loading-spinner d-none" role="status" aria-live="polite">
            <div class="spinner-border text-danger" aria-hidden="true"></div>
            <span class="admin-loading-spinner__text">Loading...</span>
          </div>
        </div>

        <div class="card">
          <div class="card-body">
            <div class="screen-content">
              <h1>REQUESTS</h1>

              <div class="screen-user">
                <table>
                  <thead>
                    <tr>
                      <th>Request ID</th>
                      <th>Username</th>
                      <th>Animal</th>
                      <th>Requesting To Change</th>
                      <th>From</th>
                      <th>To</th>
                      <th>Reason</th>
                      <th>Date</th>
                      <th>Status</th>
                    </tr>
                  </thead>
                  <tbody id="data-body"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="footer"></div>
    </div>
  </div>

  <script type="text/javascript">
    $(document).ready(function () {
      console.log("Start!");
      $("#sidebar").load("/admin/component/sidebar-component.html", function () {
        $.getScript('/admin/js/sidebarmenu.js');
      });
      $("#header").load("/admin/component/header-component.html");
      $("#footer").load("/admin/component/footer-component.html");
    });
  </script>

  <script>
    const pageState = createAdminPageState();
    pageState.resetPageState();

    function createDropdown(requestId, animal, modified) {
      const dropdown = document.createElement('div');
      dropdown.classList.add('dropdown');

      const button = document.createElement('button');
      button.textContent = 'Pending';
      dropdown.appendChild(button);

      const options = document.createElement('div');
      options.classList.add('dropdown-options');
      options.innerHTML = `
        <button class="approve-btn" data-request-id="${requestId}" data-animal="${animal}" data-to="${modified}">Approve</button>
        <button class="deny-btn" data-request-id="${requestId}">Deny</button>
      `;
      dropdown.appendChild(options);

      return dropdown;
    }

    const dataBody = document.getElementById('data-body');

    function clearTable() {
      dataBody.innerHTML = '';
    }

    async function updateTable() {
      pageState.hideError();
      pageState.showLoading();

      try {
        clearTable();

        const response = await fetch('/api/requests');

        if (!response.ok) {
          throw new Error(`Status ${response.status}`);
        }

        const data = await response.json();

        data.forEach(item => {
          const row = document.createElement('tr');

          row.innerHTML = `
            <td>${item._id}</td>
            <td>
              <div class="dropdown">
                <button class="dropdown-toggle btn-small" data-user-id="${item.username}">
                  ${item.username}
                </button>
                <div class="dropdown-menu" style="display: none;">
                  <button class="dropdown-item suspend-btn" data-user-id="${item.username}">Suspend</button>
                  <button class="dropdown-item ban-btn" data-user-id="${item.username}">Ban</button>
                </div>
              </div>
            </td>
            <td>${item.animal}</td>
            <td>${item.requestingToChange}</td>
            <td>${item.initial}</td>
            <td>${item.modified}</td>
            <td>${item.source}</td>
            <td>${item.date}</td>
            <td></td>
          `;

          dataBody.appendChild(row);

          const statusCell = row.querySelector('td:last-child');

          if (item.status === 'pending') {
            const dropdown = createDropdown(item._id, item.animal, item.modified);
            statusCell.appendChild(dropdown);
          } else {
            statusCell.textContent = item.status;
          }
        });

      } catch (error) {
        console.error('Error fetching data:', error);
        pageState.showError("Failed to load requests. Please try again.");
      } finally {
        pageState.hideLoading();
      }
    }

    updateTable();

    // Close dropdowns when clicking elsewhere
    document.addEventListener('click', function (event) {
      if (!event.target.closest('.dropdown')) {
        document.querySelectorAll('.dropdown-menu').forEach(function (element) {
          element.style.display = 'none';
        });
      }
    }, true);

    dataBody.addEventListener('click', async event => {
      const target = event.target;
      const requestId = target.getAttribute('data-request-id');
      const animal = target.getAttribute('data-animal');
      const modified = target.getAttribute('data-to');

      if (target.classList.contains('dropdown-toggle')) {
        const dropdownMenu = target.nextElementSibling;
        dropdownMenu.style.display = dropdownMenu.style.display === 'none' ? 'block' : 'none';
        return;
      }

      if (target.classList.contains('dropdown-item')) {
        const userId = target.getAttribute('data-user-id');

        if (target.classList.contains('suspend-btn')) {
          console.log("Suspended ", userId);
          // TODO: suspend user logic
        } else if (target.classList.contains('ban-btn')) {
          console.log("Banned ", userId);
          // TODO: ban user logic
        }

        target.closest('.dropdown-menu').style.display = 'none';
        return;
      }

      if (target.classList.contains('approve-btn')) {
        pageState.hideError();
        pageState.showLoading();

        try {
          console.log(`Approving request...`);
          console.log("Request ID select:   ", requestId);
          console.log("Changing status to:  ", modified);

          const conservationResponse = await fetch(`/api/updateConservationStatus/${animal}`, {
            method: 'PATCH',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              status: modified
            })
          });

          if (!conservationResponse.ok) {
            throw new Error('Failed to update conservation status');
          }

          const requestResponse = await fetch(`/api/requests/${requestId}`, {
            method: 'PATCH',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              status: 'approved'
            })
          });

          if (!requestResponse.ok) {
            throw new Error('Failed to approve request');
          }

          clearTable();
          await updateTable();

        } catch (error) {
          console.error('Error updating request status:', error);
          pageState.showError("Failed to approve request.");
        } finally {
          pageState.hideLoading();
        }

        return;
      }

      if (target.classList.contains('deny-btn')) {
        pageState.hideError();
        pageState.showLoading();

        try {
          console.log(`Denying request...`);
          console.log("Request ID select:   ", requestId);

          const response = await fetch(`/api/requests/${requestId}`, {
            method: 'PATCH',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              status: 'denied'
            })
          });

          if (!response.ok) {
            throw new Error('Failed to deny request');
          }

          clearTable();
          await updateTable();

        } catch (error) {
          console.error('Error updating request status:', error);
          pageState.showError("Failed to deny request.");
        } finally {
          pageState.hideLoading();
        }
      }
    });
  </script>
</body>

</html>
