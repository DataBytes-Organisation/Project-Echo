<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Echo Admin - Donations</title>

    <link rel="shortcut icon" type="image/png" href="/admin/images/logos/favicon.png" />
    <link type="text/css" rel="stylesheet" href="/admin/css/styles.min.css" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />

    <script
      type="text/javascript"
      src="https://kit.fontawesome.com/8aa980d912.js"
      crossorigin="anonymous"
    ></script>

    <link type="text/css" rel="stylesheet" href="./css/requests.css" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.10.6/moment.min.js"></script>

    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.css"
    />
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.min.js"
    ></script>

    <script type="text/javascript" src="/admin/js/sidebarmenu.js"></script>
    <script type="text/javascript" src="/admin/js/app.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/simplebar@latest/dist/simplebar.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/simplebar@latest/dist/simplebar.min.js"></script>

    <!-- Shared admin page state -->
    <script type="text/javascript" src="/admin/js/admin-page-state.js"></script>

    <style>
      .status-succeeded { color: green; font-weight: 600; }
      .status-failed { color: red; font-weight: 600; }
      .status-pending { color: orange; font-weight: 600; }
    </style>
  </head>

  <body>
    <div
      class="page-wrapper"
      id="main-wrapper"
      data-layout="vertical"
      data-navbarbg="skin6"
      data-sidebartype="full"
      data-sidebar-position="fixed"
      data-header-position="fixed"
    >
      <div id="sidebar"></div>

      <div class="body-wrapper">
        <div id="header"></div>

        <div class="container-fluid">
          <div class="admin-page-status">
            <div class="admin-error-banner d-none" role="alert" aria-live="polite">
              <div class="admin-error-banner__content">
                <i class="ti ti-alert-circle"></i>
                <span>Something went wrong while loading this page.</span>
              </div>
              <button type="button" class="admin-error-banner__dismiss" aria-label="Dismiss error message">
                <i class="ti ti-x"></i>
              </button>
            </div>

            <div class="admin-loading-spinner d-none" role="status" aria-live="polite">
              <div class="spinner-border text-danger" aria-hidden="true"></div>
              <span class="admin-loading-spinner__text">Loading...</span>
            </div>
          </div>

          <div class="row mb-4">
            <div class="col-md-4">
              <div class="card">
                <div class="card-body text-center">
                  <h5>Total Donations</h5>
                  <h2 id="total-donations">$0.00</h2>
                </div>
              </div>
            </div>
          </div>

          <div class="card" id="card-donations">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-center mb-3">
                <h1 class="mb-0">Donations</h1>
                <button id="refresh-btn" class="btn btn-primary">Refresh</button>
              </div>

              <table class="table table-striped table-hover align-middle">
                <thead class="table-light">
                  <tr>
                    <th>Amount</th>
                    <th>Status</th>
                    <th>Customer</th>
                    <th>Date</th>
                  </tr>
                </thead>
                <tbody id="data-body"></tbody>
              </table>
            </div>
          </div>

          <div class="row mb-4">
            <div class="col-md-6">
              <div class="card">
                <div class="card-body">
                  <h5 class="card-title">Donation Types</h5>
                  <canvas id="donationChart" width="400" height="300"></canvas>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div id="footer"></div>
      </div>
    </div>

    <script type="text/javascript">
      $(document).ready(function() {
        $("#sidebar").load("/admin/component/sidebar-component.html", function() {
          $.getScript('/admin/js/sidebarmenu.js');
        });
        $("#header").load("/admin/component/header-component.html");
        $("#footer").load("/admin/component/footer-component.html");
      });
    </script>

    <script>
      const pageState = createAdminPageState();
      pageState.resetPageState();

      const dataBody = document.getElementById('data-body');
      const refreshBtn = document.getElementById('refresh-btn');
      let donationChartInstance = null;

      function clearTable() {
        dataBody.innerHTML = '';
      }

      function updateDonationChart(donations) {
        const typeCounts = {};
        donations.forEach(d => {
          const type = d.type || 'Unknown';
          typeCounts[type] = (typeCounts[type] || 0) + 1;
        });

        const labels = Object.keys(typeCounts);
        const data = Object.values(typeCounts);

        const canvas = document.getElementById('donationChart');
        if (!canvas) return;

        const ctx = canvas.getContext('2d');

        if (donationChartInstance) {
          donationChartInstance.destroy();
        }

        donationChartInstance = new Chart(ctx, {
          type: 'pie',
          data: {
            labels: labels,
            datasets: [{
              label: 'Donation Types',
              data: data,
              backgroundColor: ['green', 'orange', 'blue', 'purple', 'gray'],
              borderWidth: 1
            }]
          },
          options: {
            responsive: true,
            plugins: {
              legend: {
                position: 'bottom',
              },
              title: {
                display: true,
                text: 'Donation Types'
              }
            }
          }
        });
      }

      function updateTotalAmount(donations) {
        const total = donations
          .filter(d => d.status === 'succeeded')
          .reduce((acc, curr) => acc + curr.amount, 0);

        document.getElementById('total-donations').textContent = `$${total.toFixed(2)}`;
      }

      async function updateTable() {
        pageState.hideError();
        pageState.showLoading();

        try {
          clearTable();

          const response = await fetch('/donations');

          if (!response.ok) {
            throw new Error(`Status ${response.status}`);
          }

          const contentType = response.headers.get('content-type') || '';
          if (!contentType.includes('application/json')) {
            const rawText = await response.text();
            console.error('Expected JSON but received:', rawText);
            throw new Error('API did not return JSON.');
          }

          const data = await response.json();
          const charges = data.charges?.data || [];

          if (charges.length === 0) {
            dataBody.innerHTML = `<tr><td colspan="4" class="text-center">No donations found.</td></tr>`;
            updateDonationChart([]);
            updateTotalAmount([]);
            return;
          }

          charges.forEach(item => {
            const row = document.createElement('tr');

            const amountCell = document.createElement('td');
            const amountDollars = Number(item.amount || 0).toFixed(2);
            amountCell.textContent = `$${amountDollars}`;

            const statusCell = document.createElement('td');
            statusCell.textContent = item.status || 'unknown';
            statusCell.classList.add(`status-${String(item.status || 'unknown').toLowerCase()}`);

            const nameOrEmailCell = document.createElement('td');
            const name = item.name || item.billing_details?.name;
            const email = item.email || item.billing_details?.email;

            if (name && name !== 'Anonymous') {
              nameOrEmailCell.textContent = name;
            } else if (email && email !== 'N/A') {
              nameOrEmailCell.textContent = email;
            } else {
              nameOrEmailCell.textContent = 'N/A';
            }

            const dateCell = document.createElement('td');
            let dateObj;
            if (item.created) {
              dateObj = new Date(item.created * 1000);
            } else if (item.timestamp) {
              dateObj = new Date(item.timestamp);
            } else {
              dateObj = new Date();
            }

            dateCell.textContent = isNaN(dateObj) ? 'Invalid Date' : dateObj.toLocaleDateString();

            row.appendChild(amountCell);
            row.appendChild(statusCell);
            row.appendChild(nameOrEmailCell);
            row.appendChild(dateCell);

            dataBody.appendChild(row);
          });

          updateDonationChart(charges);
          updateTotalAmount(charges);

        } catch (error) {
          console.error('Error fetching donations:', error);
          pageState.showError('Failed to load donations. Please try again.');
          clearTable();
          dataBody.innerHTML = `<tr><td colspan="4" class="text-center text-muted">Unable to load donations.</td></tr>`;
          updateDonationChart([]);
          updateTotalAmount([]);
        } finally {
          pageState.hideLoading();
        }
      }

      refreshBtn.addEventListener('click', updateTable);

      updateTable();
    </script>
  </body>
</html>
